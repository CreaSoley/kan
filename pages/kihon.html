<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<title>Kihon Dojo – Canne de marche</title>

<link rel="stylesheet" href="../css/style.css">

<style>

body{
    font-family:Arial, sans-serif;
    background:#f2f2f2;
    margin:0;
    padding:20px;
}

h1{
    text-align:center;
}

#container{
    display:flex;
    gap:20px;
}

#menu{
    width:250px;
    background:white;
    padding:10px;
    border-radius:10px;
    max-height:80vh;
    overflow-y:auto;
}

#menu ul{
    list-style:none;
    padding:0;
}

#menu li{
    padding:8px;
    cursor:pointer;
    border-bottom:1px solid #eee;
}

#menu li:hover{
    background:#ddd;
}

#details{
    flex:1;
    background:white;
    padding:15px;
    border-radius:10px;
}

#video-frame{
    width:100%;
    height:320px;
    margin-top:10px;
}

button{
    margin:5px;
    padding:8px 12px;
    cursor:pointer;
    border:none;
    background:#4CAF50;
    color:white;
    border-radius:5px;
}

button:hover{
    background:#45a049;
}

#favoris{
    margin-top:10px;
}

.favori-item{
    padding:5px;
    border-bottom:1px solid #eee;
    cursor:pointer;
}

.favori-item:hover{
    background:#eee;
}

</style>

</head>

<body>

<h1>Kihon Dojo – Canne de marche</h1>

<div id="controls">

<label>Tempo :</label>

<select id="tempo-select">
<option value="1">x1</option>
<option value="0.7">x0.7</option>
<option value="1.3">x1.3</option>
</select>

<button id="sparring-btn">Sparring aléatoire</button>

<button id="combo-btn">Combo aléatoire</button>

</div>

<br>

<div id="container">

<div id="menu">

<h3>Techniques</h3>
<ul id="techniques-menu"></ul>

<h3>Favoris</h3>
<div id="favoris"></div>

</div>

<div id="details">

<h2 id="technique-name">Sélectionnez une technique</h2>

<p id="technique-objectif"></p>

<p id="technique-zone"></p>

<ul id="technique-etapes"></ul>

<iframe
id="video-frame"
src=""
frameborder="0"
allowfullscreen>
</iframe>

<br>

<button id="toggle-favori">
Ajouter aux favoris
</button>

</div>

</div>

<script src="../js/kihon.js"></script>

</body>
</html>
