<!DOCTYPE html>
<html lang="fr">
<head>

<meta charset="UTF-8">
<title>TaïKan — Kihon</title>

<link rel="stylesheet" href="../css/style.css">
<meta name="viewport" content="width=device-width, initial-scale=1">

</head>

<body class="page-flex">

<!-- HEADER -->
<div class="top-bar">
<a href="../index.html">
<img src="../images/logo.png" class="logo-inline">
</a>
<h1 class="title-inline">Kihon</h1>
</div>

<!-- MODE -->
<div class="controls">

<select id="modeSelect" class="kata-select">
<option value="solo">Technique solo</option>
<option value="combo">Combo</option>
<option value="sparring">Sparring</option>
<option value="sensei">Sensei</option>
<option value="multi">Multi-directionnel</option>
</select>

<select id="techniqueSelect" class="kata-select"></select>

<select id="techniqueSelect2" class="kata-select"></select>

<button class="kawaii-btn" onclick="randomTechnique()">🎲 Surprise</button>

</div>
<select id="multiType" class="kata-select">
<option value="tech">Technique</option>
<option value="combo">Combo</option>
<option value="sparring">Sparring</option>
</select>
  
<!-- OPTIONS -->
<div class="controls">

<select id="countSelect" class="kata-select">
<option value="5">Compte 5</option>
<option value="10">Compte 10</option>
</select>

<select id="sparringCount" class="kata-select">
<option value="5">5 assauts</option>
<option value="6">6 assauts</option>
<option value="7">7 assauts</option>
<option value="8">8 assauts</option>
<option value="9">9 assauts</option>
<option value="10">10 assauts</option>
</select>

<select id="speedSelect" class="kata-select">
<option value="2000">Lent</option>
<option value="1200">Normal</option>
<option value="700">Rapide</option>
</select>

</div>

<!-- CONTROLES -->
<div class="button-row">

<button class="btn-kawaii start" onclick="startTraining()">▶</button>
<button class="btn-kawaii pause" onclick="pauseTraining()">⏸</button>
<button class="btn-kawaii stop" onclick="stopTraining()">⏹</button>
<button class="btn-kawaii reset" onclick="resetTraining()">🔄</button>

</div>

<!-- CARD -->
<div id="card" class="tech-card kihon-card"></div>

<script src="../js/kihon.js"></script>

</body>
</html>
