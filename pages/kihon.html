<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>TaïKan — Kihon</title>

<link rel="stylesheet" href="../style.css">
<meta name="viewport" content="width=device-width, initial-scale=1">

</head>

<body class="page-flex">

<!-- HEADER -->
<div class="top-bar">
  <a href="../index.html">
    <img src="../images/logo.png" class="logo-inline">
  </a>
  <h1 class="title-inline">Kihon</h1>
</div>

<!-- MODE -->
<div class="controls">

<select id="modeSelect">
<option value="gammes">🎵 Gammes</option>
<option value="combinaisons">🧩 Combinaisons</option>
<option value="hara">🫁 Hara ligne</option>
</select>

<select id="intervalSelect">
<option value="30">30s</option>
<option value="45">45s</option>
<option value="60" selected>1 min</option>
<option value="90">1m30</option>
<option value="120">2 min</option>
</select>

<button class="kawaii-btn" onclick="startTraining()">▶️ Lancer</button>
<button class="kawaii-btn" onclick="pauseTraining()">⏸ Pause</button>
<button class="kawaii-btn" onclick="stopTraining()">⏹ Stop</button>

</div>

<!-- NAVIGATION -->
<div class="nav-arrows">
<button onclick="prevTech()">⬅</button>
<button onclick="nextTech()">➡</button>
</div>

<!-- CARD -->
<div id="card" class="tech-card kihon-card">

<h2 id="techName">Prêt 🌸</h2>

<div id="impactZone" class="impact-icon hidden">
<img id="impactImg" src="">
</div>

<p id="techObjectif"></p>

<div id="steps"></div>

<iframe id="video" class="hidden"></iframe>

</div>

<script src="../js/kihon.js"></script>

</body>
</html>
