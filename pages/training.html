<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<title>TaïKan — Entraînement</title>

<link rel="stylesheet" href="../css/style.css">

<meta name="viewport" content="width=device-width, initial-scale=1">
</head>

<body class="page-flex">

<!-- HEADER -->

<div class="top-bar">
  <a href="../index.html">
    <img src="../images/logo.png" class="logo-inline">
  </a>
  <h1 class="title-inline">Entraînement</h1>
</div>

<p class="subtitle">
séance complète guidée — self défense avec canne
</p>

<!-- PARAMÈTRES -->

<div class="tech-card training-card">

<button class="accordion-toggle" onclick="toggleAccordion()">
⚙️ Paramètres de la séance
</button>

<div id="trainingConfig" class="accordion-content open">

<div class="param-row">
<label for="meditationSelect">🧘 Méditation</label>
<select id="meditationSelect">
<option value="0">Ancrage et respiration</option>
<option value="1">Respiration profonde</option>
<option value="2">Calme intérieur</option>
</select>
</div>

<div class="param-row">
<label for="warmupSelect">🔥 Échauffement</label>
<select id="warmupSelect">
<option value="0">Échauffement complet</option>
<option value="1">Échauffement court</option>
</select>
</div>

<div class="param-row">
<label for="flowDuration">🦯 Flow manipulation de canne</label>
<select id="flowDuration">
<option value="1">1 minute</option>
<option value="3">3 minutes</option>
<option value="5">5 minutes</option>
<option value="10">10 minutes</option>
</select>
</div>

<div class="param-row">
<label for="multiType">⚔️ Multi-directionnel</label>
<select id="multiType">
<option value="tech">Technique</option>
<option value="combo">Combo</option>
<option value="sparring">Sparring</option>
</select>
</div>

<div class="param-row">
<label for="kataSelect">🥋 Kata</label>
<select id="kataSelect"></select>
</select>
</div>

<div class="param-row">
<label for="kataGuidance">🎧 Guidage kata</label>
<select id="kataGuidance">
<option value="audio">Guidage audio</option>
<option value="tts">Synthèse vocale</option>
<option value="none">Sans guidage</option>
</select>
</div>

<div class="param-row">
<label for="kataRepeat">🔁 Répétitions</label>
<select id="kataRepeat">
<option value="1">1 répétition</option>
<option value="2">2 répétitions</option>
<option value="3">3 répétitions</option>
</select>
</div>

</div>
<!-- AFFICHAGE ENTRAINEMENT -->

<div id="trainingDisplay" class="result-display">
Prêt.
</div>
</div>

<!-- BARRE PROGRESSION -->

<div id="progressBar" class="training-bar">

<div class="badge" id="step1">🧘</div>
<div class="badge" id="step2">🔥</div>
<div class="badge" id="step3">🦯</div>
<div class="badge" id="step4">🥋</div>
<div class="badge" id="step5">⚔️</div>
<div class="badge" id="step6">📜</div>
<div class="badge" id="step7">🧘‍♂️</div>
<div class="badge" id="step8">🌙</div>

</div>

<!-- BOUTONS CONTROLE -->

<div class="button-row">

<button class="btn-kawaii start" onclick="startTraining()">
▶ Lecture
</button>

<button class="btn-kawaii pause" onclick="pauseTraining()">
⏸ Pause
</button>

<button class="btn-kawaii stop" onclick="stopTraining()">
⏹ Stop
</button>

<button class="btn-kawaii reset" onclick="resetTraining()">
🔄 Reset
</button>

<button class="btn-kawaii" onclick="toggleSensei()">
🥋 Mode Sensei
</button>

</div>

<script src="../js/trainingEngine.js"></script>

<script>
function toggleAccordion(){
  const panel = document.getElementById("trainingConfig")
  panel.classList.toggle("open")
}
</script>

</body>
</html>
