<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>TaïKan — Kata</title>
<link rel="stylesheet" href="../css/style.css">
<meta name="viewport" content="width=device-width, initial-scale=1">
</head>

<body class="page-flex">

<div class="top-bar">
  <a href="../index.html">
    <img src="../images/logo.png" class="logo-inline">
  </a>
  <h1 class="title-inline">Kata</h1>
</div>

<p class="subtitle">
Enchaînements techniques structurés pour travailler la coordination et la mémoire motrice
</p>

<div class="nav-arrows">
  <button class="nav-btn" onclick="prevKata()">◀</button>

  <select id="kataSelect" class="kata-select"></select>

  <button class="nav-btn" onclick="nextKata()">▶</button>
  <button class="kawaii-btn" onclick="randomKata()">🎲 Surprise</button>
</div>
<div class="voice-controls">
  <button id="startVoiceBtn">▶ Guidage vocal</button>
  <button id="pauseVoiceBtn">⏸ Pause</button>
  <button id="stopVoiceBtn">⏹ Stop</button>
</div>

<label for="partSelect">Parties à répéter :</label>
<select id="partSelect" multiple size="4"></select>

<label for="repeatCount">Nombre de répétitions :</label>
<input type="number" id="repeatCount" value="1" min="1" style="width:50px;">

<div id="resultDisplay" class="voice-display"></div>
<div id="card" class="tech-card kata-card"></div>

<script src="../js/kata.js"></script>

</body>
</html>
